<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kygo Home (single embed) · Live Preview</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #F8FAFC; }
    .preview-banner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
      background: #0F172A; color: #fff; padding: 6px 14px;
      display: flex; align-items: center; gap: 12px; font-size: 12px; font-weight: 500;
    }
    .preview-banner b { color: #22C55E; }
    .preview-banner button {
      margin-left: auto; background: #22C55E; color: #fff; border: 0;
      padding: 4px 12px; border-radius: 9999px; font-size: 11px; font-weight: 700; cursor: pointer;
    }
    .preview-spacer { height: 32px; }
  </style>
</head>
<body>
  <div class="preview-banner">
    <span>🟢 <b>LIVE PREVIEW</b> · <b>kygo-home</b> (all 7 sections, single embed)</span>
    <button onclick="location.href = location.pathname + '?v=' + Date.now()">Hard refresh</button>
  </div>
  <div class="preview-spacer"></div>

  <kygo-home></kygo-home>

  <script>
    const cacheBust = '?v=' + Date.now();
    const s = document.createElement('script');
    s.src = 'kygo-bundle.js' + cacheBust;
    // jsDelivr branch URL alternative:
    // s.src = 'https://cdn.jsdelivr.net/gh/Kygo-Health/kygo-elements@<branch>/kygo-bundle.js' + cacheBust;
    document.body.appendChild(s);
  </script>
</body>
</html>
