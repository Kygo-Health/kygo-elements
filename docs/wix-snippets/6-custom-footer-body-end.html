  var xIcon = '<svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>';

  var subscribeStrip = '<div class="kygo-footer-sub"><div class="kygo-footer-sub-inner">'
    + '<div class="kygo-footer-sub-copy"><strong>Get research-backed insights, straight to your inbox.</strong>'

  var footerHTML = '<footer class="kygo-footer"><div class="kygo-footer-inner">' + subscribeStrip + '<div class="kygo-footer-top">'
    + '<div class="kygo-footer-brand"><a href="https://www.kygo.app/" class="kygo-footer-logo"><img src="https://static.wixstatic.com/media/273a63_7ac49e91323749f49cadfe795ff3680f~mv2.png" alt="Kygo Health" /><span>KYGO</span></a>'

    + '<div class="kygo-footer-column"><h4>Product</h4><ul><li><a href="https://www.kygo.app/how-it-works">How It Works</a></li><li><a href="https://www.kygo.app/faq">FAQ</a></li><li><a href="https://track.tenjin.com/v0/click/cD7zgIPLuiZMMWmWkXLsvy" class="cta-primary" data-track-position="footer" data-track-label="footer-link-ios" target="_blank" rel="noopener">Download iOS</a></li><li><a href="https://track.tenjin.com/v0/click/eMjS3ZkseCvs2lO9AVESkO" class="cta-android" data-action="android-download" data-track-position="footer" data-track-label="footer-link-android" target="_blank" rel="noopener">Download Android</a></li></ul></div>'

  document.getElementById('kygo-footer-root').innerHTML = footerHTML;

  // ── Native email capture ──────────────────────────────────────────────
  // Same contract as the <kygo-*-subscribe> web components, but this footer
  // is plain pasted HTML (not a custom element), so it POSTs directly and
  // dispatches the `subscribe` document event itself:
  //   1. POST { email, source: "footer" } to the same-origin Velo endpoint
  //      /_functions/subscribe; drive the UI from the HTTP response.
  //   2. On success, dispatch a `subscribe` CustomEvent on document
  //      (bubbles + composed, detail { email, source }) so kygo-tracking.js
  //      mirrors email_subscribe → GA4 with source "footer".
  var subForm = document.getElementById('kygo-footer-sub-form');
  if (subForm) {
    subForm.addEventListener('submit', function (e) {
      e.preventDefault();
      var input = subForm.querySelector('input');
      var btn = subForm.querySelector('button');
      var msg = document.getElementById('kygo-footer-sub-msg');
      var email = (input.value || '').trim();
      if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        msg.className = 'kygo-footer-sub-msg error';
        msg.textContent = 'Please enter a valid email.';
        return;
      }
      input.disabled = true;
      btn.disabled = true;
      msg.className = 'kygo-footer-sub-msg';
      msg.textContent = '';

      var settled = false;
      var timeout = setTimeout(function () {
        if (settled) return;
        settled = true;
        input.disabled = false;
        btn.disabled = false;
        msg.className = 'kygo-footer-sub-msg error';
        msg.textContent = "Hmm — that didn't go through. Please try again.";
      }, 10000);

      fetch('/_functions/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email, source: 'footer' })
      }).then(function (res) {
        if (settled) return;
        settled = true;
        clearTimeout(timeout);
        if (res && res.ok) {
          subForm.style.display = 'none';
          msg.className = 'kygo-footer-sub-msg success';
          msg.textContent = "You're in — new insights are on the way.";
          document.dispatchEvent(new CustomEvent('subscribe', {
            bubbles: true, composed: true,
            detail: { email: email, source: 'footer' }
          }));
        } else {
          input.disabled = false;
          btn.disabled = false;
          msg.className = 'kygo-footer-sub-msg error';
          msg.textContent = "Hmm — that didn't go through. Please try again.";
        }
      }).catch(function () {
        if (settled) return;
        settled = true;
        clearTimeout(timeout);
        input.disabled = false;
        btn.disabled = false;
        msg.className = 'kygo-footer-sub-msg error';
        msg.textContent = "Hmm — that didn't go through. Please try again.";
      });
    });
